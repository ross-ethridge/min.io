tenant:
  name: demucs-minio
  configSecret:
    name: demucs-minio
    existingSecret: true

  pools:
    - name: pool-0
      servers: 1
      volumesPerServer: 1
      size: 50Gi
      storageClassName: directpv-min-io
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: "OnRootMismatch"
        runAsNonRoot: true
      containerSecurityContext:
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault

  certificate:
    requestAutoCert: false

  metrics:
    enabled: false

ingress:
  api:
    enabled: false
  console:
    enabled: false
