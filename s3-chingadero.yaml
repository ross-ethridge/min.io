tenant:
  name: s3-chingadero
  configSecret:
    name: s3-chingadero
    existingSecret: true

  pools:
    - name: pool-0
      servers: 1
      volumesPerServer: 1
      size: 300Gi
      storageClassName: directpv-min-io
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: "OnRootMismatch"
        runAsNonRoot: true
      containerSecurityContext:
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault

  certificate:
    requestAutoCert: false

  metrics:
    enabled: false

ingress:
  api:
    enabled: true
    ingressClassName: traefik
    host: s3.chingadero.com
    tls:
      - secretName: s3-chingadero-api-tls
        hosts:
          - s3.chingadero.com
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
  console:
    enabled: true
    ingressClassName: traefik
    host: console.s3.chingadero.com
    tls:
      - secretName: s3-chingadero-console-tls
        hosts:
          - console.s3.chingadero.com
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
